<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Team Card 등록
  </title>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js">
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
 </head>
 <body>
  <div class="main">
   <div class="p-5 mb-4 bg-body-tertiary rounded-3">
    <div class="container-fluid py-5">
     <h1>
      내일배움캠프 백엔드 개발자 양성 과정
      <br/>
      Kotlin &amp; Spring 8기 팀원 소개
     </h1>
    </div>
   </div>
  </div>
  <section class="section team-card">
   <div class="container">
    <div id="cardArea">
    </div>
   </div>
  </section>
  <section class="section join">
   <p class="mb-3">
    팀원으로 합류하고 싶으신가요?
   </p>
   <button class="btn btn-dark" id="toggleFormBtn">
    합류하기!
   </button>

   <div id="registerModal" style="display: none;">
    <div class="modal-content-custom" style="max-width: 500px;">
     <button aria-label="닫기" class="close-btn" id="closeRegisterModal">
     </button>
     <h2 class="mb-4 text-center">
      정보 등록
     </h2>
     <div class="mb-3">
      <div class="upload-box">
       <span id="fileName">
        사진을 올려주세요!
       </span>
       <button id="uploadBtn" type="button">
        파일 업로드
       </button>
      </div>
      <input accept="image/*" id="imageFile" style="display: none;" type="file"/>
     </div>
     <div class="form-floating mb-3">
      <input class="form-control" id="name" placeholder="이름" type="text"/>
      <label for="name">
       이름
      </label>
     </div>
     <div class="form-floating mb-3">
      <input class="form-control" id="comment" placeholder="한마디" type="text"/>
      <label for="comment">
       한마디
      </label>
     </div>
     <div class="form-floating mb-3">
      <input class="form-control" id="mbti" placeholder="MBTI" type="text"/>
      <label for="mbti">
       MBTI
      </label>
     </div>
     <div class="form-floating mb-3">
      <input class="form-control" id="intro" placeholder="자기소개" type="text"/>
      <label for="intro">
       자기소개
      </label>
     </div>
     <div class="form-floating mb-4">
      <input class="form-control" id="hobby" placeholder="취미" type="text"/>
      <label for="hobby">
       취미
      </label>
     </div>
     <div class="form-floating mb-3">
      <input class="form-control" id="github" placeholder="Github URL" type="text"/>
      <label for="github">
       Github URL
      </label>
     </div>
     <button class="btn btn-primary w-100" id="submitBtn">
      등록하기
     </button>
    </div>
   </div>
  </section>
  <footer class="footer">
   내일배움캠프 2025 Kotlin &amp; Spring 과정 8기 · Designed &amp; Developed by Team 8
   <br/>
   ⓒ 2025 All rights reserved.
  </footer>
  <script src="main.js" type="module">
  </script>
 </body>
</html>
